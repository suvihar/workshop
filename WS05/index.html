<!DOCTYPE html>
<html>
<head>
<title>My first responsive page</title>
</head>
<body>
<div class="responsive-container">
<div class="column">Column 1</div>
<div class="column">Column 2</div>
    <style>
        .responsive-container {
      display: flex;
      flex-wrap: wrap;
    }
    
    .column {
      flex: 1;
      padding: 10px;
    }
    
    @media (max-width: 600px) {
      .column {
        flex: 100%;
      }
    }
    </style>   
</div>
<nav class="responsive-nav">
      <button class="menu-toggle">☰ Menu</button>
      <ul class="nav-list">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
</nav>
<style>
.responsive-nav .nav-list {
      display: flex;
      list-style: none;
    }
    
    @media (max-width: 600px) {
      .responsive-nav .nav-list {
        display: none;
      }
    
      .responsive-nav .menu-toggle {
        display: block;
      }
    }
</style>
<img src="matrixlasit.jpg" alt="Responsive Image" class="responsive-image">
<style>
.responsive-image {
      max-width: 100%;
      height: auto;
    }
</style>
<div class="media-query-box">Resize the window to see the effect</div>
<style>
.media-query-box {
      padding: 20px;
      text-align: center;
    }
    
    @media (max-width: 600px) {
      .media-query-box {
        background-color: lightcoral;
      }
    }
    
    @media (min-width: 601px) {
      .media-query-box {
        background-color: lightblue;
      }
    }
</style>
</body>
</html>
